volumes:
  postgres_data:

services:
  postgres:
    image: postgres:14.7
    container_name: postgres
    # 5432로 포워딩 할 경우 host os에 설치된 postgres와 겹칠 수 있으므로 host에 설치된 postgres를 내려야함
    ports:
      - '5434:5432'
    environment:
      - POSTGRES_USER=${POSTGRES_USERNAME}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DATABASE}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
